name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/marketplace-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/marketplace-web

jobs:
  # ─────────────────────────────────────────
  # JOB 1: .NET Build & Test
  # ─────────────────────────────────────────
  build-api:
    name: Build & Test API (.NET 10)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: marketplace_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore NuGet packages
        working-directory: ./api
        run: dotnet restore

      - name: Build
        working-directory: ./api
        run: dotnet build --no-restore --configuration Release

      - name: Run migrations (test DB)
        working-directory: ./api
        env:
          DATABASE_URL: "Host=localhost;Port=5432;Database=marketplace_test;Username=postgres;Password=postgres"
        run: dotnet ef database update --no-build

      - name: Run tests
        working-directory: ./api
        env:
          DATABASE_URL: "Host=localhost;Port=5432;Database=marketplace_test;Username=postgres;Password=postgres"
          JWT_SECRET: "test-secret-key-for-ci-minimum-32-chars!!"
          JWT_ISSUER: "https://localhost"
          JWT_AUDIENCE: "https://localhost"
        run: dotnet test --no-build --configuration Release --verbosity normal

  # ─────────────────────────────────────────
  # JOB 2: Next.js Build
  # ─────────────────────────────────────────
  build-web:
    name: Build Web (Next.js 15)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./web/package-lock.json

      - name: Install dependencies
        working-directory: ./web
        run: npm ci

      - name: Type check
        working-directory: ./web
        run: npx tsc --noEmit

      - name: Build
        working-directory: ./web
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SIGNALR_HUB: ${{ secrets.NEXT_PUBLIC_SIGNALR_HUB }}
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  # ─────────────────────────────────────────
  # JOB 3: Docker Build & Push (sadece main)
  # ─────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/DockerFile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 4: Deploy to VPS (sadece main)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            cd /opt/marketplace

            # GitHub Container Registry'den yeni image'ları çek
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ${{ env.IMAGE_API }}:${{ github.sha }}
            docker pull ${{ env.IMAGE_WEB }}:${{ github.sha }}

            # .env.prod'daki IMAGE tag'lerini güncelle
            sed -i "s|API_IMAGE=.*|API_IMAGE=${{ env.IMAGE_API }}:${{ github.sha }}|" .env.prod
            sed -i "s|WEB_IMAGE=.*|WEB_IMAGE=${{ env.IMAGE_WEB }}:${{ github.sha }}|" .env.prod

            # Zero-downtime rolling restart
            docker compose -f docker-compose.prod.yml up -d --no-deps api
            sleep 10
            docker compose -f docker-compose.prod.yml up -d --no-deps web

            # Eski image'ları temizle
            docker image prune -f

            echo "✅ Deploy tamamlandı: ${{ github.sha }}"

      - name: Health check
        run: |
          sleep 15
          curl --fail --retry 5 --retry-delay 5 \
            https://${{ secrets.API_DOMAIN }}/health \
            || (echo "❌ Health check başarısız!" && exit 1)

  # ─────────────────────────────────────────
  # JOB 5: Bildirim (başarısız olursa)
  # ─────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-api, build-web, docker, deploy]
    if: failure() && github.ref == 'refs/heads/main'

    steps:
      - name: Send failure notification
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Deploy başarısız: ${context.sha.substring(0, 7)}`,
              body: `**Branch:** ${context.ref}\n**Commit:** ${context.sha}\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'ci-failure']
            });
